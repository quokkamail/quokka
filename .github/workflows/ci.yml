name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license:
    name: License
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3.5.3

      - name: Set up Go
        uses: actions/setup-go@v4.0.1
        with:
          go-version: "1.20.5"

      - name: Install addlicense
        run: go install github.com/google/addlicense@v1.1.1

      - name: Check license
        run: addlicense -v -check .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3.5.3

      - name: Set up Go
        uses: actions/setup-go@v4.0.1
        with:
          go-version: "1.20.5"

      - name: Lint project
        uses: golangci/golangci-lint-action@v3.6.0
        with:
          version: v1.51.2
          skip-cache: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [license, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3.5.3

      - name: Set up Go
        uses: actions/setup-go@v4.0.1
        with:
          go-version: "1.20.5"

      - name: Build project
        run: go build -v .

      - name: Test project
        run: go test -v ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload test coverage
        uses: codecov/codecov-action@v3.1.4
